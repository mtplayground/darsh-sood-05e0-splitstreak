<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#23483f" />
    <title>SplitStreak Offline</title>
    <style>
      :root {
        color: #1d2433;
        background: #f6f8f5;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(560px, calc(100% - 32px));
      }

      h1 {
        margin: 0 0 12px;
        color: #121822;
        font-size: 2.5rem;
        line-height: 1;
      }

      p {
        margin: 0;
        color: #3f4858;
        font-size: 1.125rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SplitStreak</h1>
      <p>The app shell is available offline. Reconnect to refresh workout data.</p>
    </main>
  </body>
</html>
